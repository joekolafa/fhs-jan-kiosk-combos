function useMobile(bp = 640) {
  const [m, setM] = useState(window.innerWidth < bp);
  useEffect(() => { const h = () => setM(window.innerWidth < bp); window.addEventListener("resize", h); return () => window.removeEventListener("resize", h); }, []);
  return m;
}

function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

                <tr><th style={{padding:6, fontSize:10, color:C.smokeLight, textAlign:"left"}}>Sub Size ↓</th>{["Small","Medium","Large"].map(s => <th key={s} style={{padding:6, fontSize:11, fontWeight:600, color:C.smokeMed}}>{s}</th>)}</tr>
              </thead>
              <tbody>
                {d.drink_sub_matrix.map(row => (
                  <tr key={row.sub}>
                    <td style={{padding:6, fontWeight:700, fontSize:12}}>{row.sub}</td>
                    <HeatCell value={row.s} pct={row.sp} max={11059}/>
                    <HeatCell value={row.m} pct={row.mp} max={11059}/>
                    <HeatCell value={row.l} pct={row.lp} max={11059}/>
                  </tr>
                ))}
              </tbody>
            </table>
          </AnimatedCard>
        </>}

        {/* ===== BY SUB ITEM ===== */}
        {tab === "By Sub Item" && <>
          <div style={{marginTop:8}}>
            <Insight title="Tight cluster with a few outliers" accent={C.tealBg}>
              20 of 25 subs fall between 50–60% combo attach. Veggie (41.5%), Tuna (43.3%), and Roast Beef (48.5%) are the low outliers — health-conscious or lighter options where the chips-and-drink bundle is a less natural fit.
            </Insight>
          </div>

          <SectionTitle sub="Sorted by total volume">Combo vs. Just-the-Sub by Item</SectionTitle>
          <AnimatedCard>
            <ResponsiveContainer width="100%" height={mob ? 520 : 560}>
              <BarChart data={d.by_item} layout="vertical" barCategoryGap="14%">
                <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
                <XAxis type="number" tick={{fontSize:10}} tickFormatter={fmt}/>
                <YAxis type="category" dataKey="item" width={mob ? 105 : 185} tick={{fontSize: mob ? 9 : 11}}/>
                <Tooltip content={<CustomTooltip/>}/>
                <Bar dataKey="combo" name="Combo" fill={C.fire} radius={[0,4,4,0]} stackId="a" animationDuration={800}/>
                <Bar dataKey="just_sub" name="Just Sub" fill={C.creamDark} radius={[0,4,4,0]} stackId="a" animationDuration={800}/>
              </BarChart>
            </ResponsiveContainer>
          </AnimatedCard>

          <SectionTitle sub="Ranked by combo conversion — green ≥57%, yellow ≥50%, red <50%">Attach Rate Ranking</SectionTitle>
          <AnimatedCard style={{padding: mob ? 10 : 14, overflowX:"auto"}}>
            <table style={{width:"100%", borderCollapse:"collapse", fontSize: mob ? 11.5 : 12.5}}>
              <thead>
                <tr style={{borderBottom:`2px solid ${C.creamDark}`}}>
                  {["Sub","Total","Combos","Just Sub","Attach Rate"].map(h =>
                    <th key={h} style={{padding:"8px 8px", textAlign: h==="Sub" ? "left" : "right", fontWeight:700, color:C.smokeMed, fontSize:10, textTransform:"uppercase", letterSpacing:"0.05em"}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {[...d.by_item].sort((a,b) => b.attach_rate - a.attach_rate).map((item, i) => (
                  <tr key={item.item} style={{borderBottom:`1px solid ${C.creamDark}`, background: i%2===0 ? C.white : C.cream}}>
                    <td style={{padding:"6px 8px", fontWeight:600, fontSize: mob ? 11 : 12.5}}>{item.item}</td>
                    <td style={{padding:"6px 8px", textAlign:"right"}}>{fmt(item.total)}</td>
                    <td style={{padding:"6px 8px", textAlign:"right", color:C.fire, fontWeight:600}}>{fmt(item.combo)}</td>
                    <td style={{padding:"6px 8px", textAlign:"right", color:C.smokeLight}}>{fmt(item.just_sub)}</td>
                    <td style={{padding:"6px 8px", textAlign:"right"}}>
                      <div style={{display:"inline-flex", alignItems:"center", gap:5}}>
                        <div style={{width: mob ? 40 : 55, height:5, background:C.creamDark, borderRadius:3, overflow:"hidden"}}>
                          <div style={{width:`${item.attach_rate}%`, height:"100%", background: item.attach_rate >= 57 ? C.teal : item.attach_rate >= 50 ? C.gold : C.fire, borderRadius:3, transition:"width 0.6s ease"}}/>
                        </div>
                        <span style={{fontWeight:700, fontSize:12, minWidth:40}}>{fmtPct(item.attach_rate)}</span>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </AnimatedCard>
        </>}

        {/* ===== SIDES & DRINKS ===== */}
        {tab === "Sides & Drinks" && <>
          <div style={{marginTop:8}}>
            <Insight icon="🍟" title="Fries are the #2 combo side" accent={C.goldBg}>
              Fries (regular + large) account for 10.8% of combo side selections (3,864 orders). Mac & Cheese comes in at 7.0%, followed by cookies and desserts at ~8.5% combined.
            </Insight>
          </div>

          <SectionTitle sub="Chips dominate at 67.5% — fries are a strong second at 10.8%">Side Selection Distribution</SectionTitle>
          <div style={{display:"flex", gap:12, flexWrap:"wrap", flexDirection: mob ? "column" : "row"}}>
            <AnimatedCard style={{flex:"1 1 380px", minWidth:0}}>
              <ResponsiveContainer width="100%" height={420}>
                <BarChart data={d.side_choices} layout="vertical" barCategoryGap="12%">
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
                  <XAxis type="number" tick={{fontSize:10}} tickFormatter={fmt}/>
                  <YAxis type="category" dataKey="side" width={mob ? 95 : 135} tick={{fontSize: mob ? 9.5 : 11}}/>
                  <Tooltip content={<CustomTooltip/>}/>
                  <Bar dataKey="qty" name="Qty" fill={C.fire} radius={[0,4,4,0]} animationDuration={800}/>
                </BarChart>
              </ResponsiveContainer>
            </AnimatedCard>
            <AnimatedCard style={{flex:"1 1 240px", minWidth:0}}>
              <h3 style={{fontSize:12.5, fontWeight:700, margin:"0 0 8px", color:C.smokeMed}}>Side Category Breakdown</h3>
              <ResponsiveContainer width="100%" height={mob ? 220 : 260}>
                <PieChart>
                  <Pie data={d.side_categories} cx="50%" cy="50%" outerRadius={mob ? 70 : 95} innerRadius={mob ? 38 : 52} paddingAngle={2} dataKey="value"
                    label={mob ? false : ({name, percent}) => percent > 0.03 ? `${name} ${(percent*100).toFixed(0)}%` : ""} labelLine={!mob} style={{fontSize:10}}>
                    {C.chart.map((c,i) => <Cell key={i} fill={c}/>)}
                  </Pie>
                  <Tooltip formatter={(v, name) => [fmt(v), name]}/>
                </PieChart>
              </ResponsiveContainer>
              <div style={{display:"flex", flexWrap:"wrap", gap:"3px 10px", justifyContent:"center"}}>
                {d.side_categories.map((s,i) => <div key={s.name} style={{display:"flex", alignItems:"center", gap:4, fontSize:10, color:C.smokeMed}}><div style={{width:8, height:8, borderRadius:4, background:C.chart[i]}}/>{s.name}</div>)}
              </div>
            </AnimatedCard>
          </div>

          <SectionTitle sub="Fountain drinks are 97% of combo drink selections">Drink Selection</SectionTitle>
          <div style={{display:"flex", gap:12, flexWrap:"wrap", flexDirection: mob ? "column" : "row"}}>
            <AnimatedCard style={{flex:"1 1 380px", minWidth:0}}>
              <ResponsiveContainer width="100%" height={230}>
                <BarChart data={d.drink_choices} layout="vertical" barCategoryGap="14%">
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
                  <XAxis type="number" tick={{fontSize:10}} tickFormatter={fmt}/>
                  <YAxis type="category" dataKey="drink" width={mob ? 95 : 130} tick={{fontSize: mob ? 9.5 : 11}}/>
                  <Tooltip content={<CustomTooltip/>}/>
                  <Bar dataKey="qty" name="Qty" fill={C.teal} radius={[0,4,4,0]} animationDuration={800}/>
                </BarChart>
              </ResponsiveContainer>
            </AnimatedCard>
            <AnimatedCard style={{flex:"1 1 240px", minWidth:0}}>
              <h3 style={{fontSize:12.5, fontWeight:700, margin:"0 0 8px", color:C.smokeMed}}>Combo Drink Size Split</h3>
              <ResponsiveContainer width="100%" height={mob ? 180 : 200}>
                <PieChart>
                  <Pie data={d.drink_size} cx="50%" cy="50%" outerRadius={mob ? 60 : 75} innerRadius={mob ? 32 : 42} paddingAngle={3} dataKey="value"
                    label={mob ? false : ({name, percent}) => `${name} ${(percent*100).toFixed(0)}%`} labelLine={!mob} style={{fontSize:11}}>
                    {[C.fire, C.gold, C.teal].map((c,i) => <Cell key={i} fill={c}/>)}
                  </Pie>
                  <Tooltip formatter={(v, name) => [fmt(v), name]}/>
                </PieChart>
              </ResponsiveContainer>
              <div style={{textAlign:"center", fontSize:11, color:C.smokeMed, marginTop:4}}>
                Small 25.1% · Medium 43.6% · Large 31.4%
              </div>
            </AnimatedCard>
          </div>
        </>}

        {/* ===== POS COMPARISON ===== */}
        {tab === "POS Comparison" && <>
          <div style={{display:"flex", gap:10, flexWrap:"wrap", marginTop:8, flexDirection: mob ? "column" : "row"}}>
            <KPI label="Kiosk Combo Attach" value="56.1%" sub="35,863 of 64,101 sub orders" color={C.teal}/>
            <KPI label="POS Combo Attach" value="46.8%" sub="225,128 of 481,110 orders" color={C.fire}/>
            <KPI label="Kiosk Advantage" value="+9.3pp" sub="Every sub item converts higher on kiosk" color={C.gold}/>
          </div>

          <SectionTitle sub="Every sub converts higher on kiosk — gap ranges from 5.0pp to 19.3pp">Per-Item Combo Attach: Kiosk vs. POS</SectionTitle>
          <AnimatedCard>
            <ResponsiveContainer width="100%" height={mob ? 560 : 580}>
              <BarChart data={d.pos_by_item.map(r => ({...r, gap: +(r.k_attach - r.attach).toFixed(1)}))} layout="vertical" barCategoryGap="12%">
                <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
                <XAxis type="number" tick={{fontSize:10}} tickFormatter={v => v+"%"} domain={[0, 70]}/>
                <YAxis type="category" dataKey="item" width={mob ? 90 : 145} tick={{fontSize: mob ? 9 : 11}}/>
                <Tooltip content={<DualTooltip fmtVal={v => v.toFixed(1)+"%"}/>}/>
                <Bar dataKey="attach" name="POS" fill={C.fire} radius={[0,4,4,0]} animationDuration={800}/>
                <Bar dataKey="k_attach" name="Kiosk" fill={C.teal} radius={[0,4,4,0]} animationDuration={800}/>
              </BarChart>
            </ResponsiveContainer>
            <ChartLegend items={[["Kiosk", C.teal], ["POS", C.fire]]}/>
          </AnimatedCard>

          <SectionTitle sub="Avg price includes all modifiers — every sub is higher on kiosk">Per-Item Avg Price: Kiosk vs. POS</SectionTitle>
          <div style={{display:"flex", gap:10, flexWrap:"wrap", marginBottom:12, flexDirection: mob ? "column" : "row"}}>
            <KPI label="Kiosk Weighted Avg" value="$13.88" sub="64,067 specialty subs" color={C.teal}/>
            <KPI label="POS Weighted Avg" value="$12.83" sub="481,110 specialty subs" color={C.fire}/>
            <KPI label="Kiosk Premium" value="+$1.05" sub="+8.2% per sub item" color={C.gold}/>
          </div>
          <AnimatedCard>
            <ResponsiveContainer width="100%" height={mob ? 540 : 580}>
              <BarChart data={d.price_by_item.map(r => ({...r, delta: +(r.k - r.p).toFixed(2)}))} layout="vertical" barCategoryGap="12%">
                <CartesianGrid strokeDasharray="3 3" stroke="#eee"/>
                <XAxis type="number" tick={{fontSize:10}} tickFormatter={v => "$"+v} domain={[8, 18]}/>
                <YAxis type="category" dataKey="item" width={mob ? 90 : 145} tick={{fontSize: mob ? 9 : 11}}/>
                <Tooltip content={<DualTooltip fmtVal={v => "$"+v.toFixed(2)}/>}/>
                <Bar dataKey="p" name="POS" fill={C.fire} radius={[0,4,4,0]} animationDuration={800}/>
                <Bar dataKey="k" name="Kiosk" fill={C.teal} radius={[0,4,4,0]} animationDuration={800}/>
              </BarChart>
            </ResponsiveContainer>
            <ChartLegend items={[["Kiosk", C.teal], ["POS", C.fire]]}/>
          </AnimatedCard>

          <div style={{marginTop:14, display:"flex", gap:12, flexWrap:"wrap"}}>
            <Insight title="Consistent premium across the entire menu" accent={C.tealBg}>
              Every single sub averages higher on kiosk, ranging from +$0.59 (Sweet & Spicy Meatball) to +$1.64 (Pastrami). The January premium of $1.05 is driven by both higher combo attach and guests choosing larger sizes and more premium toppings.
            </Insight>
            <Insight title="What's driving the premium?" accent={C.creamDark}>
              The kiosk's $1.05 per-sub premium reflects both <strong>higher combo attach</strong> (+9.3pp, adding ~$0.40 per sub) and guests independently <strong>choosing larger sizes and more premium toppings</strong> (~$0.65) when ordering at their own pace.
            </Insight>
          </div>

          <SectionTitle sub="If patterns from January held, and stores shifted from 2 to 3 kiosks">Forecast: What Kiosk Adoption Could Mean</SectionTitle>
          <AnimatedCard style={{padding: mob ? 16 : 24}}>
            <div style={{fontSize:12.5, color:C.smokeMed, lineHeight:1.6, marginBottom:18}}>
              From a separate 34-store analysis, stores with 3 kiosks see <strong>30.1% kiosk share</strong> vs. 18.3% with 2 kiosks. That shifts roughly <strong>617 additional orders per store every 2 months</strong> from POS to kiosk. If the January Product Mix pricing patterns held at scale:
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%", borderCollapse:"collapse", fontSize: mob ? 11.5 : 13}}>
                <thead>
                  <tr style={{borderBottom:`2px solid ${C.creamDark}`}}>
                    <th style={{padding:"9px 10px", textAlign:"left", fontWeight:700, color:C.smokeMed, fontSize:10.5, textTransform:"uppercase"}}>Metric</th>
                    <th style={{padding:"9px 10px", textAlign:"right", fontWeight:700, color:C.smokeMed, fontSize:10.5, textTransform:"uppercase"}}>2 Kiosk</th>
                    <th style={{padding:"9px 10px", textAlign:"right", fontWeight:700, color:C.smokeMed, fontSize:10.5, textTransform:"uppercase"}}>3 Kiosk</th>
                    <th style={{padding:"9px 10px", textAlign:"right", fontWeight:700, color:C.gold, fontSize:10.5, textTransform:"uppercase"}}>Diff</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Kiosk sales share","18.3%","30.1%","+11.8pp",""],
                    ["Kiosk orders (2mo)","970","1,587","+617",""],
                    ["POS orders (2mo)","2,525","1,908","−617",""],
                    ["---"],
                    ["Kiosk combos (@ 56.1%)","544","890","+346",""],
                    ["POS combos (@ 46.8%)","1,182","893","−289",""],
                    ["Total store combos","1,726","1,783","+57",""],
                    ["---"],
                    ["Per-order kiosk premium","","","$1.05",""],
                    ["↳ from combo attach (~$0.40)","","","","sub"],
                    ["↳ from size/topping upsell (~$0.65)","","","","sub"],
                    ["Incremental revenue (2mo)","","","+$648",""],
                    ["Projected annual per store","","","+$3,887","hl"],
                  ].map((row, i) => {
                    if (row[0] === "---") return <tr key={i}><td colSpan={4} style={{padding:3, borderBottom:`1px solid ${C.creamDark}`}}/></tr>;
                    const isHL = row[4] === "hl", isSub = row[4] === "sub";
                    return (
                      <tr key={i} style={{borderBottom:`1px solid ${C.creamDark}`, background: isHL ? C.goldBg : i%2===0 ? C.white : C.cream}}>
                        <td style={{padding:"7px 10px", fontWeight: isHL ? 800 : 600, color: isHL ? C.gold : isSub ? C.smokeLight : C.smoke, fontSize: isSub ? 11.5 : 12.5, fontStyle: isSub ? "italic" : "normal", textAlign:"left"}}>{row[0]}</td>
                        <td style={{padding:"7px 10px", textAlign:"right", fontSize: isSub ? 11 : 12.5}}>{row[1]}</td>
                        <td style={{padding:"7px 10px", textAlign:"right", fontSize: isSub ? 11 : 12.5}}>{row[2]}</td>
                        <td style={{padding:"7px 10px", textAlign:"right", fontWeight:700, color: isHL ? C.gold : isSub ? C.smokeLight : C.teal, fontSize: isSub ? 11 : 12.5}}>{row[3]}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <Insight title="How to read these numbers" accent={C.creamDark}>
              The $1.05 per-sub premium comes from the January Product Mix export (kiosk avg $13.88 vs. POS avg $12.83, all stores). The 2-to-3 kiosk adoption shift (18.3% to 30.1% kiosk share, 617 incremental orders) comes from a separate 34-store analysis. The forecast assumes both patterns would hold together at scale.
            </Insight>
          </AnimatedCard>

          <SectionTitle>If These Patterns Held at Scale</SectionTitle>
          <div style={{display:"flex", gap:12, flexWrap:"wrap", flexDirection: mob ? "column" : "row"}}>
            {[{s:100,a:388710},{s:500,a:1943550},{s:1000,a:3887100},{s:1500,a:5830650}].map(({s,a}) => (
              <KPI key={s} label={`${fmt(s)} stores`} value={fmtUSD(a)} sub="projected annual from 2K→3K" color={C.gold}/>
            ))}
          </div>

          <div style={{background:C.fireBg, borderRadius:12, padding: mob ? 16 : 20, marginTop:24, border:`1px solid ${C.fireLight}30`}}>
            <div style={{fontSize:15, fontWeight:800, color:C.fire, marginBottom:7}}>Bottom Line</div>
            <div style={{fontSize:13.5, color:C.smoke, lineHeight:1.7}}>
              January's data shows the kiosk delivers a <strong>56.1% combo attach rate</strong> — 9.3pp higher than POS's 46.8% — with tight clustering across most subs (51–59%). The Product Mix shows a <strong>$1.05 per-sub premium</strong> on kiosk ($13.88 vs. $12.83), consistent across all 25+ subs. If these patterns held, moving from 2-kiosk to 3-kiosk adoption projects to <strong>~$3,900/year per store</strong> in incremental revenue.
            </div>
          </div>
        </>}

      </div>

      <div style={{textAlign:"center", padding:"14px 20px 22px", fontSize:10.5, color:C.smokeLight}}>
        Firehouse Subs Kiosk Combo Analysis · January 2026 (full month) · Toast Product Mix Export · 64,693 kiosk + 487,990 POS orders
      </div>
    </div>
  );
}

ReactDOM.render(<Dashboard/>, document.getElementById("root"));
</script>
</body>
</html>
